global:
  seeds: [7, 21, 42, 63, 84]   
  backtest:
    start: "2025-04-30"
    end:   "2025-07-30"
    freq: "1M"           
    warmup_months: 1

# ==========================
# Gemini experiments
# ==========================
experiments_gemini:

  - id: L1_summarizer_gemini
    seeds: [7]
    setup:
      model: "gemini-flash-native"
      sector_detector: true
      horizon_classifier: true
      stats_mode: "summary_acf"
      pattern_detection: true
      summarization: "off"

  - id: L1_pattern_gemini
    seeds: [7]
    setup:
      model: "gemini-flash-native"
      sector_detector: true
      horizon_classifier: true
      stats_mode: "summary_acf"
      pattern_detection: false
      summarization: "16sent"

  - id: L1_horizon_gemini
    seeds: [7]
    setup:
      model: "gemini-flash-native"
      sector_detector: true
      horizon_classifier: false
      stats_mode: "summary_acf"
      pattern_detection: true
      summarization: "16sent"

  - id: L1_stats_gemini
    seeds: [7]
    setup:
      model: "gemini-flash-native"
      sector_detector: true
      horizon_classifier: true
      stats_mode: "off"
      pattern_detection: true
      summarization: "16sent"

  - id: FULL_gemini
    setup:
      model: "gemini-flash-native"
      sector_detector: true
      horizon_classifier: true
      stats_mode: "summary_acf"
      pattern_detection: true
      summarization: "16sent"
